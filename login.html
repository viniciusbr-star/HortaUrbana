<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="login.css">
    <title>Login - Horta Urbana</title>
</head>
<body>
    <div class="container">
      <img src="/images/hortaurbana.png" alt="Horta Urbana" />
      <h1>Login</h1>
      <div class="input-group">
        <label for="username">Usuário:</label>
        <input
          type="text"
          id="username"
          name="username"
          placeholder="xxxxx@email.com"
        />
      </div>

      <div class="input-group">
        <label for="password">Senha:</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="********"
        />
      </div>

      <a href="index.html">
        <button type="button">Entrar</button>
      </a>    

      <p><a href="">Esqueci minha senha</a></p>

      <p id="error-message" style="display: none; color: red">
        Credenciais inválidas!
      </p>

    </div>
  </body>
</html>

    
</body>
</html>
