<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/styles/index.css" />
    <title>Horta Urbana - Gestão de Canteiros</title>
  </head>
  <body>
    <header>
      <button  onclick="irPara('sair')" class="btn-sair btn-clean">
        <svg
          xmlns="w3.org"
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
          <polyline points="16 17 21 12 16 7"></polyline>
          <line x1="21" y1="12" x2="9" y2="12"></line>
        </svg>
        Sair
      </button>
      <img src="/images/hortaurbana.png" alt="" />
      <h1>Horta Urbana - Gestão de Canteiros</h1>

      <p>
        Bem-vindo ao sistema de gestão de canteiros da Horta Urbana! Aqui você
        pode criar, editar e excluir canteiros, além de visualizar os detalhes
        de cada um.
      </p>
    </header>
    <div class="container">
      <nav>
        <ul>
          <li>
            <button onclick="irPara('painel')">Painel de Controle</button>
          </li>
          <li>
            <button onclick="irPara('plantio')">Novo Plantio</button>
          </li>
          <li>
            <button onclick="irPara('mapa')">Mapa de Hortas</button>
          </li>
        </ul>
      </nav>
    </div>

    <footer>
      <p>&copy; 2026 Horta Urbana. Todos os direitos reservados.</p>
    </footer>

    <script src="../script.js"></script>
  </body>
</html>
